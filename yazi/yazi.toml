# Yazi runtime config. Theme lives in theme.toml (generated by Matugen).

[plugin]
prepend_previewers = [
    { url = "*.md", run = 'piper -- glow -s dark -w $w "$1"' },
]

[[plugin.prepend_fetchers]]
url   = "*"
run   = "git"
group = "git"

[[plugin.prepend_fetchers]]
url   = "*/"
run   = "git"
group = "git"

[opener]
edit = [
    { run = 'nvim "$@"', block = true, for = "unix" },
]

[open]
prepend_rules = [
    { mime = "text/*",                                   use = "edit" },
    { mime = "application/{json,jsonc,toml,yaml,x-yaml,xml,javascript,x-shellscript,x-perl,x-ruby}", use = "edit" },
    { mime = "*/{javascript,typescript}",                use = "edit" },
    { mime = "inode/x-empty",                            use = "edit" },
]
