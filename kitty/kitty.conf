# ── Font ──────────────────────────────────────────────────────────────────────
font_family      MonaspiceNe Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size 13

# ── Window ────────────────────────────────────────────────────────────────────
window_padding_width 8
cursor_shape block
cursor_blink_interval 0
confirm_os_window_close 0

# ── Transparency ──────────────────────────────────────────────────────────────
# Kitty renders its background alpha reliably here (ghostty's is broken on this
# NVIDIA/Wayland box); Hyprland's decoration:blur handles the frosted-glass look.
background_opacity 0.5
dynamic_background_opacity yes

# ── Colors (Matugen-generated, tracks the wallpaper) ──────────────────────────
include theme.conf

# ── Keybinds (mirrors the old ghostty split bindings) ─────────────────────────
map ctrl+shift+r load_config_file

# left/right = side-by-side (vsplit); up/down = stacked (hsplit)
map ctrl+shift+h launch --location=vsplit --cwd=current
map ctrl+shift+l launch --location=vsplit --cwd=current
map ctrl+shift+k launch --location=hsplit --cwd=current
map ctrl+shift+j launch --location=hsplit --cwd=current

map alt+h neighboring_window left
map alt+j neighboring_window down
map alt+k neighboring_window up
map alt+l neighboring_window right

# Zoom the active split to fill the window (ghostty's toggle_split_zoom)
map alt+enter toggle_layout stack
map alt+0 layout_action bias 50

enabled_layouts splits,stack
