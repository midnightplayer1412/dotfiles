###################
### KEYBINDINGS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = SUPER # Caps Lock remapped to Super via kb_options

# Example binds, see https://wiki.hypr.land/Configuring/Binds/ for more
bind = $mainMod, RETURN, exec, $terminal              # @cheat Apps: Open terminal
bind = $mainMod SHIFT, R, exec, hyprctl reload        # @cheat System: Reload Hyprland
bind = $mainMod, Q, killactive,                       # @cheat Window: Close active window
bind = $mainMod, X, exit,                             # @cheat System: Exit Hyprland
bind = $mainMod, E, exec, $fileManager                # @cheat Apps: Open file manager
bind = $mainMod, C, togglefloating,                   # @cheat Window: Toggle floating
bind = $mainMod, P, pseudo, # dwindle                 # @cheat Window: Toggle pseudotile
bind = $mainMod, S, layoutmsg, togglesplit # dwindle  # @cheat Layout: Toggle split
bind = $mainMod, F, fullscreen,                       # @cheat Window: Toggle fullscreen

# Resize the window size using SUPER + R
bind = $mainMod, R,submap,resize                      # @cheat Window: Resize mode (h/j/k/l)
submap=resize
bind = , l, resizeactive, 30 0
bind = , h, resizeactive, -30 0
bind = , k, resizeactive, 0 -30
bind = , j, resizeactive, 0 30
bind = , Return,submap,reset
submap=reset

# Move focus with mainMod + arrow keys
bind = $mainMod, H, movefocus, l                      # @cheat Window: Focus left
bind = $mainMod, L, movefocus, r                      # @cheat Window: Focus right
bind = $mainMod, K, movefocus, u                      # @cheat Window: Focus up
bind = $mainMod, J, movefocus, d                      # @cheat Window: Focus down

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1                      # @cheat Workspace: Switch to workspace 1
bind = $mainMod, 2, workspace, 2                      # @cheat Workspace: Switch to workspace 2
bind = $mainMod, 3, workspace, 3                      # @cheat Workspace: Switch to workspace 3
bind = $mainMod, 4, workspace, 4                      # @cheat Workspace: Switch to workspace 4
bind = $mainMod, 5, workspace, 5                      # @cheat Workspace: Switch to workspace 5
bind = $mainMod, 6, workspace, 6                      # @cheat Workspace: Switch to workspace 6
bind = $mainMod, 7, workspace, 7                      # @cheat Workspace: Switch to workspace 7
bind = $mainMod, 8, workspace, 8                      # @cheat Workspace: Switch to workspace 8
bind = $mainMod, 9, workspace, 9                      # @cheat Workspace: Switch to workspace 9
bind = $mainMod, 0, workspace, 10                     # @cheat Workspace: Switch to workspace 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1          # @cheat Workspace: Move window to workspace 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2          # @cheat Workspace: Move window to workspace 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3          # @cheat Workspace: Move window to workspace 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4          # @cheat Workspace: Move window to workspace 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5          # @cheat Workspace: Move window to workspace 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6          # @cheat Workspace: Move window to workspace 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7          # @cheat Workspace: Move window to workspace 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8          # @cheat Workspace: Move window to workspace 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9          # @cheat Workspace: Move window to workspace 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10         # @cheat Workspace: Move window to workspace 10

bind = $mainMod SHIFT, H, swapwindow, l               # @cheat Window: Swap left
bind = $mainMod SHIFT, L, swapwindow, r               # @cheat Window: Swap right
bind = $mainMod SHIFT, K, swapwindow, u               # @cheat Window: Swap up
bind = $mainMod SHIFT, J, swapwindow, d               # @cheat Window: Swap down

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e-1
bind = $mainMod, mouse_up, workspace, e+1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+   # @cheat Media: Volume up
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-         # @cheat Media: Volume down
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle               # @cheat Media: Mute audio
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle          # @cheat Media: Mute microphone
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -n1 set 5%+                          # @cheat System: Brightness up
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -n1 set 5%-                        # @cheat System: Brightness down

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next         # @cheat Media: Next track
bindl = , XF86AudioPause, exec, playerctl play-pause  # @cheat Media: Play/pause
bindl = , XF86AudioPlay, exec, playerctl play-pause   # @cheat Media: Play/pause
bindl = , XF86AudioPrev, exec, playerctl previous     # @cheat Media: Previous track

# App launcher
bind = $mainMod, space, global, quickshell:launcher_toggle    # @cheat Apps: App launcher

# Notification center
bind = $mainMod, N, global, quickshell:notifications_toggle   # @cheat System: Notification center

# Workspace overview
bind = $mainMod, TAB, global, quickshell:overview_toggle      # @cheat Window: Workspace overview

# Alt-tab window switcher — hold Super+Alt, Tab cycles MRU windows, Shift+Tab
# reverses, Delete/Q closes the highlighted one, release Super commits (Enter
# is a fallback commit). The opening chord both advances the cycle and enters
# the submap that owns every subsequent key while Super+Alt stay held.
bind = $mainMod ALT, Tab, global, quickshell:overview_altTabNext   # @cheat Window: Alt-tab switcher (hold, Tab cycles, release to focus)
bind = $mainMod ALT, Tab, submap, altTab
submap = altTab
bind = $mainMod ALT, Tab, global, quickshell:overview_altTabNext
bind = $mainMod ALT SHIFT, Tab, global, quickshell:overview_altTabPrev
bind = $mainMod ALT, Delete, global, quickshell:overview_altTabClose
bind = $mainMod ALT, Q, global, quickshell:overview_altTabClose
# Commit/cancel. The primary commit is releasing Super, which is detected in
# QML (Overview.qml) — Hyprland cannot dispatch a bind on a modifier-KEY release
# (modifiers are consumed as modifier-state, never matched as a keysym/keycode —
# verified by instrumentation). Enter is kept as an explicit fallback commit;
# both the modifier-held (mods=72) and bare (mods=0) variants are bound so it
# works whether or not Super+Alt are still down.
bind = $mainMod ALT, return, global, quickshell:overview_altTabCommit
bind = $mainMod ALT, return, submap, reset
bind = , return, global, quickshell:overview_altTabCommit
bind = , return, submap, reset
bind = $mainMod ALT, escape, global, quickshell:overview_altTabCancel
bind = $mainMod ALT, escape, submap, reset
bind = , escape, global, quickshell:overview_altTabCancel
bind = , escape, submap, reset
submap = reset

# Keybinding cheatsheet
bind = $mainMod, slash, global, quickshell:cheatsheet_toggle  # @cheat System: Keybinding cheatsheet

# Settings panel
bind = $mainMod, backspace, global, quickshell:settings_toggle  # @cheat System: Settings panel

# Lock screen — Quickshell lockscreen; hyprlock kept as a fallback
bind = $mainMod, escape, exec, qs -p ~/.config/quickshell/lock-screen.qml -d -n   # @cheat System: Lock screen
bind = $mainMod SHIFT, escape, exec, hyprlock                                     # @cheat System: Lock screen (hyprlock fallback)

# Clipboard history
bind = $mainMod, V, exec, cursor-clip                 # @cheat Apps: Clipboard history

# Screenshot
bind = $mainMod SHIFT, S, exec, hyprshot -m region --freeze -o ~/Pictures/Screenshot   # @cheat Screenshot: Region
bind = , PRINT, exec, hyprshot -m output --freeze -o ~/Pictures/Screenshot             # @cheat Screenshot: Full screen
bind = $mainMod SHIFT, PRINT, exec, hyprshot -m window --freeze -o ~/Pictures/Screenshot  # @cheat Screenshot: Active window

# Color picker — copies hex to clipboard
bind = $mainMod SHIFT, C, exec, hyprpicker -a -f hex && notify-send "Color picker" "Copied $(wl-paste)"  # @cheat Apps: Color picker
