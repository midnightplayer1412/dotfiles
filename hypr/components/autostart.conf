#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:
exec-once = fcitx5 &
# Do NOT add --format bgr/rgb here. The 3-channel formats really are 3/4 the
# memory (measured: 6075Kb vs 8100Kb buffers), but this compositor rejects them:
# the daemon gets "WAYLAND PROTOCOL ERROR: Format invalid" from wlroots, then
# panics with BrokenPipe at daemon/src/main.rs:712 and core-dumps on startup.
# The result is a black desktop with no wallpaper daemon at all.
# Verified 2026-07-21: argb and abgr (4-channel) work; bgr and rgb both die.
# awww-daemon --help hints at this — argb is the default "because it is most
# widely supported".
exec-once = awww-daemon
# Regenerate the Super+/ cheatsheet keymap from binds.conf on every reload, so
# it can never drift from the actual binds. MUST stay above the quickshell
# relaunch below: KeymapData loads the JSON once at startup with no file
# watching, so a shell that starts first would show the previous keymap until
# the next reload.
exec = $HOME/.config/hypr/scripts/gen-keymap.sh
# Kill BOTH possible process names (qs and quickshell are the same binary) before
# relaunching, so a config reload always converges to exactly one instance.
exec = pkill -x quickshell; pkill -x qs; quickshell &
exec-once = cursor-clip --daemon
# `exec` not `exec-once`: this runs at login AND on every config reload. A
# reload re-reads touchpad.conf (which always declares enabled = true as the
# boot default), so without this line Super+Shift+R would silently re-enable a
# touchpad the user had turned off.
exec = $HOME/.config/hypr/scripts/apply-touchpad.sh
