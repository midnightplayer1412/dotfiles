# ── General ──────────────────────────────────────────────
set -g default-shell /bin/bash
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g escape-time 0
set -g history-limit 10000

# ── Prefix ──────────────────────────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ── Splits ──────────────────────────────────────────────
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# ── Vi mode ─────────────────────────────────────────────
setw -g mode-keys vi
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# ── Resize panes ────────────────────────────────────────
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Matugen colors ──────────────────────────────────────
source-file -q ~/.config/tmux/colors.conf

# ── Status bar (top, minimal) ───────────────────────────
set -g status-position top
set -g status-style "bg=#{@matugen-surface-container},fg=#{@matugen-on-surface}"
set -g status-left "#[fg=#{@matugen-primary},bold] #S #[default] "
set -g status-left-length 20
set -g status-right ""
setw -g window-status-format "#[fg=#{@matugen-outline}] #I:#W "
setw -g window-status-current-format "#[fg=#{@matugen-primary},bold] #I:#W "

# ── Pane borders ────────────────────────────────────────
set -g pane-border-style "fg=#{@matugen-outline}"
set -g pane-active-border-style "fg=#{@matugen-primary}"

# ── Plugins (TPM) ──────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'

run '~/.tmux/plugins/tpm/tpm'
