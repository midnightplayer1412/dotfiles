# ── General ──────────────────────────────────────────────
set -g default-shell /bin/bash
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g escape-time 0
set -g history-limit 10000
set -g focus-events on

# ── Prefix ──────────────────────────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ── Reload ──────────────────────────────────────────────
bind r source-file ~/.config/tmux/tmux.conf \; display "config reloaded"

# ── Splits ──────────────────────────────────────────────
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# ── Vi mode ─────────────────────────────────────────────
setw -g mode-keys vi
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# ── Resize panes ────────────────────────────────────────
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# ── Matugen colors ──────────────────────────────────────
source-file -q ~/.config/tmux/colors.conf

# ── Status bar (top, minimal) ───────────────────────────
set -g status-position top
set -g status-interval 5
# Bar glows in primary color while prefix is armed
set -g status-style "bg=#{?client_prefix,#{@matugen-primary},#{@matugen-surface-container}},fg=#{?client_prefix,#{@matugen-on-primary},#{@matugen-on-surface}}"
set -g status-left "#[fg=#{?client_prefix,#{@matugen-on-primary},#{@matugen-primary}},bold] #S #[default] "
set -g status-left-length 20
set -g status-right-length 100
set -g status-right "#[fg=#{@matugen-secondary}] #(cd #{pane_current_path} && git rev-parse --abbrev-ref HEAD 2>/dev/null)  #[fg=#{@matugen-primary}] %H:%M "
setw -g window-status-format "#[fg=#{@matugen-outline}] #I:#W "
setw -g window-status-current-format "#[fg=#{?client_prefix,#{@matugen-on-primary},#{@matugen-primary}},bold] #I:#W#{?window_zoomed_flag, Z,} "

# ── Pane borders ────────────────────────────────────────
set -g pane-border-style "fg=#{@matugen-outline}"
set -g pane-active-border-style "fg=#{@matugen-primary}"

# ── Plugins (TPM) ──────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'

set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

run '~/.tmux/plugins/tpm/tpm'
