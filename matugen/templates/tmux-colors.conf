# Matugen-generated tmux colors
set -g @matugen-primary "{{colors.primary.default.hex}}"
set -g @matugen-on-primary "{{colors.on_primary.default.hex}}"
set -g @matugen-primary-container "{{colors.primary_container.default.hex}}"
set -g @matugen-secondary "{{colors.secondary.default.hex}}"
set -g @matugen-on-secondary "{{colors.on_secondary.default.hex}}"
set -g @matugen-surface "{{colors.surface.default.hex}}"
set -g @matugen-on-surface "{{colors.on_surface.default.hex}}"
set -g @matugen-surface-container "{{colors.surface_container.default.hex}}"
set -g @matugen-outline "{{colors.outline.default.hex}}"
