# Yazi theme — generated by Matugen from the current wallpaper.
# Keep edits in matugen/templates/yazi-theme.toml, not the rendered file.

[mgr]
cwd = { fg = "{{colors.primary.default.hex}}" }

hovered         = { fg = "{{colors.on_primary.default.hex}}", bg = "{{colors.primary.default.hex}}" }
preview_hovered = { underline = true }

find_keyword  = { fg = "{{colors.tertiary.default.hex}}", italic = true }
find_position = { fg = "{{colors.primary.default.hex}}", bg = "reset", italic = true }

marker_copied   = { fg = "{{colors.primary.default.hex}}",   bg = "{{colors.primary.default.hex}}" }
marker_cut      = { fg = "{{colors.error.default.hex}}",     bg = "{{colors.error.default.hex}}" }
marker_marked   = { fg = "{{colors.tertiary.default.hex}}",  bg = "{{colors.tertiary.default.hex}}" }
marker_selected = { fg = "{{colors.secondary.default.hex}}", bg = "{{colors.secondary.default.hex}}" }

tab_active   = { fg = "{{colors.on_primary.default.hex}}", bg = "{{colors.primary.default.hex}}" }
tab_inactive = { fg = "{{colors.on_surface.default.hex}}", bg = "{{colors.surface_container.default.hex}}" }
tab_width    = 1

count_copied   = { fg = "{{colors.on_primary.default.hex}}",   bg = "{{colors.primary.default.hex}}" }
count_cut      = { fg = "{{colors.on_error.default.hex}}",     bg = "{{colors.error.default.hex}}" }
count_selected = { fg = "{{colors.on_secondary.default.hex}}", bg = "{{colors.secondary.default.hex}}" }

border_symbol = "│"
border_style  = { fg = "{{colors.outline.default.hex}}" }

syntect_theme = ""

[mode]
normal_main = { fg = "{{colors.on_primary.default.hex}}",   bg = "{{colors.primary.default.hex}}",   bold = true }
normal_alt  = { fg = "{{colors.primary.default.hex}}",      bg = "{{colors.primary_container.default.hex}}" }

select_main = { fg = "{{colors.on_secondary.default.hex}}", bg = "{{colors.secondary.default.hex}}", bold = true }
select_alt  = { fg = "{{colors.secondary.default.hex}}",    bg = "{{colors.secondary_container.default.hex}}" }

unset_main  = { fg = "{{colors.on_surface.default.hex}}",   bg = "{{colors.outline.default.hex}}",   bold = true }
unset_alt   = { fg = "{{colors.on_surface.default.hex}}",   bg = "{{colors.surface_container.default.hex}}" }

[status]
overall   = { bg = "{{colors.surface_container.default.hex}}" }
sep_left  = { open = "", close = "" }
sep_right = { open = "", close = "" }

progress_label  = { fg = "{{colors.on_primary.default.hex}}", bold = true }
progress_normal = { fg = "{{colors.primary.default.hex}}",    bg = "{{colors.surface_container.default.hex}}" }
progress_error  = { fg = "{{colors.error.default.hex}}",      bg = "{{colors.surface_container.default.hex}}" }

permissions_t = { fg = "{{colors.primary.default.hex}}" }
permissions_r = { fg = "{{colors.secondary.default.hex}}" }
permissions_w = { fg = "{{colors.tertiary.default.hex}}" }
permissions_x = { fg = "{{colors.primary.default.hex}}" }
permissions_s = { fg = "{{colors.outline.default.hex}}" }

[which]
mask            = { bg = "{{colors.surface.default.hex}}" }
cand            = { fg = "{{colors.primary.default.hex}}" }
rest            = { fg = "{{colors.outline.default.hex}}" }
desc            = { fg = "{{colors.secondary.default.hex}}" }
separator       = "  "
separator_style = { fg = "{{colors.outline.default.hex}}" }

[input]
border   = { fg = "{{colors.primary.default.hex}}" }
title    = {}
value    = {}
selected = { reversed = true }

[confirm]
border  = { fg = "{{colors.primary.default.hex}}" }
title   = { fg = "{{colors.primary.default.hex}}" }
content = {}
list    = {}
btn_yes = { reversed = true }
btn_no  = {}

[pick]
border   = { fg = "{{colors.primary.default.hex}}" }
active   = { fg = "{{colors.primary.default.hex}}", bold = true }
inactive = {}

[completion]
border   = { fg = "{{colors.primary.default.hex}}" }
active   = { bg = "{{colors.surface_container.default.hex}}" }
inactive = {}

[tasks]
border  = { fg = "{{colors.primary.default.hex}}" }
title   = {}
hovered = { underline = true }

[spot]
border   = { fg = "{{colors.primary.default.hex}}" }
title    = { fg = "{{colors.primary.default.hex}}" }
tbl_col  = { fg = "{{colors.tertiary.default.hex}}" }
tbl_cell = { reversed = true }

[notify]
title_info  = { fg = "{{colors.primary.default.hex}}" }
title_warn  = { fg = "{{colors.tertiary.default.hex}}" }
title_error = { fg = "{{colors.error.default.hex}}" }

[help]
on      = { fg = "{{colors.primary.default.hex}}" }
run     = { fg = "{{colors.tertiary.default.hex}}" }
desc    = { fg = "{{colors.outline.default.hex}}" }
hovered = { bg = "{{colors.surface_container.default.hex}}", bold = true }
footer  = { fg = "{{colors.on_primary.default.hex}}", bg = "{{colors.primary.default.hex}}" }

[git]
modified  = { fg = "{{colors.tertiary.default.hex}}" }
added     = { fg = "{{colors.primary.default.hex}}" }
untracked = { fg = "{{colors.outline.default.hex}}" }
ignored   = { fg = "{{colors.outline.default.hex}}" }
deleted   = { fg = "{{colors.error.default.hex}}", bold = true }
updated   = { fg = "{{colors.secondary.default.hex}}" }
unknown   = { fg = "{{colors.outline.default.hex}}" }

[filetype]
rules = [
    { mime = "image/*",                              fg = "{{colors.tertiary.default.hex}}" },
    { mime = "{audio,video}/*",                      fg = "{{colors.secondary.default.hex}}" },
    { mime = "application/{,g}zip",                  fg = "{{colors.primary.default.hex}}" },
    { mime = "application/x-{tar,bzip*,7z*,rar,xz}", fg = "{{colors.primary.default.hex}}" },
    { mime = "application/{json,x-shellscript}",     fg = "{{colors.primary.default.hex}}" },
    { mime = "text/*",                               fg = "{{colors.on_surface.default.hex}}" },
    { mime = "inode/directory",                      fg = "{{colors.primary.default.hex}}" },
    { mime = "*",                                    fg = "{{colors.on_surface.default.hex}}" },
]
